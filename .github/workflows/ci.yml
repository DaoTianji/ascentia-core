name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Verify modules
        run: go mod verify

      - name: Build
        run: go build -o /tmp/ascentia-core ./cmd/ascentia-core/

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1
